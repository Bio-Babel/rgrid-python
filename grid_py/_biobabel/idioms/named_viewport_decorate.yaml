id: grid_py.named_viewport_decorate
name: Name viewports and seek_viewport back in to decorate an already-drawn region
applicable_to:
  - grid_py.Viewport
description: |
  Give a viewport `name=` when you push it, and that region becomes addressable
  for the rest of the draw session. After the whole figure is rendered you can
  jump back into any named region with `seek_viewport(name)`, draw on top of it
  (a highlight box, a star on a cell, an extra label), then navigate back.

  This is the "decorate" pattern. ComplexHeatmap's `decorate_*()` functions are
  built exactly this way: remember `current_viewport().name`, `seek_viewport()`
  to the target by name, run the drawing callback so its grobs land in that
  region's coordinate system, then `seek_viewport()` back to where you were.

  `seek_viewport(name)` searches the whole retained tree (it works only because
  regions are returned to with `up_viewport()`, not discarded with
  `pop_viewport()`). Use `down_viewport(name)` for a child of the *current*
  node, and `current_viewport()` to read where you are. To return to ROOT (which
  is not seekable by name) navigate with `up_viewport(n)` instead — that is why
  ComplexHeatmap's decorate helper guards `seek_viewport` with
  `if current_name not in (None, "ROOT")`.
code_template: |
  from grid_py import (
      CairoRenderer, get_state, grid_newpage,
      Viewport, Unit, gpar,
      push_viewport, up_viewport,
      seek_viewport, current_viewport,
      grid_rect, grid_text,
  )
  get_state().init_device(CairoRenderer(width=4, height=4, dpi=150, bg="white"))
  grid_newpage()

  # 1) Render the figure, giving each region a name.
  push_viewport(Viewport(name="layout"))
  push_viewport(Viewport(
      x=Unit(0.0, "npc"), width=Unit(0.7, "npc"),
      just=("left", "centre"), name="body",
  ))
  grid_rect(gp=gpar(fill="lightblue", col="black"))
  up_viewport()  # body retained in the tree, addressable by name
  up_viewport()  # back to ROOT

  # We happen to be sitting in some named region when decoration is requested.
  seek_viewport("layout")
  remembered = current_viewport().name  # "layout" — a named region we can seek back to

  # 2) Decorate: seek into "body" and draw on top of it, in its coordinates.
  seek_viewport("body")
  assert current_viewport().name == "body"
  grid_rect(  # a highlight box, now in body's coordinate system
      x=Unit(0.5, "npc"), y=Unit(0.5, "npc"),
      width=Unit(0.3, "npc"), height=Unit(0.3, "npc"),
      gp=gpar(col="red", fill="transparent", lwd=2),
  )
  grid_text("decorated", gp=gpar(col="red"))

  # 3) Navigate back to where we started.
  #    Seek by name for a named region; for ROOT, use up_viewport(n) instead.
  if remembered not in (None, "ROOT"):
      seek_viewport(remembered)
  else:
      up_viewport()
  assert current_viewport().name == remembered
  get_state().get_renderer().write_to_png("/tmp/named_viewport_decorate.png")
anti_pattern_paired: null
typical_use_case: "annotate an already-rendered region (highlight a heatmap cell, add a star/label) without redrawing it"
